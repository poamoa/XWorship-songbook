<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Songbook</title>
    <!-- Wir laden die Bibliothek -->
    <script src="https://unpkg.com"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eee; }
        #output { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .chord { color: red; font-weight: bold; font-family: monospace; }
        .row { display: flex; flex-wrap: wrap; margin-bottom: 5px; }
        .column { display: flex; flex-direction: column; margin-right: 4px; }
    </style>
</head>
<body>

    <h1>ChordSheetJS Test</h1>
    
    <select id="song-select" onchange="testRun()">
        <option value="">-- Song wählen --</option>
        <option value="test">Hotel California (Test)</option>
    </select>

    <div id="output">Hier erscheint der Song...</div>

<script>
    function testRun() {
        const select = document.getElementById('song-select');
        const output = document.getElementById('output');

        if (select.value === "test") {
            // Der Songtext im Inline-Format
            const songText = "{title: Hotel California}\n[Bm] On a dark desert [F#] highway";

            try {
                // 1. Parser erstellen
                const parser = new chordsheetjs.ChordProParser();
                // 2. Text parsen
                const song = parser.parse(songText);
                // 3. HTML erzeugen
                const formatter = new chordsheetjs.HtmlTableFormatter();
                const html = formatter.format(song);

                // 4. Anzeigen
                output.innerHTML = html;
            } catch (e) {
                output.innerHTML = "Fehler: " + e.message;
            }
        }
    }
</script>

</body>
</html>
