<div id="content">
  <div id="controls">
    <button onclick="transpose(-1)">- Halbton</button>
    <button onclick="transpose(1)">+ Halbton</button>
  </div>

  <iframe id="viewer" src="song1.html"></iframe>
</div>

<script>
let currentTranspose = 0;

const chords = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];

function loadSong(file) {
  document.getElementById('viewer').src = file;
  currentTranspose = 0;
}

function transpose(step) {
  const iframe = document.getElementById('viewer');
  const doc = iframe.contentDocument || iframe.contentWindow.document;

  if (!doc) return;

  const elements = doc.querySelectorAll('*');

  elements.forEach(el => {
    el.innerHTML = el.innerHTML.replace(/\b([A-G](#|b)?)(m|maj|min|7|sus|dim|aug)?\b/g, (match) => {
      return transposeChord(match, step);
    });
  });

  currentTranspose += step;
}

function transposeChord(chord, step) {
  const regex = /^([A-G])(#|b)?(.*)$/;
  const match = chord.match(regex);

  if (!match) return chord;

  let [, root, accidental, rest] = match;

  let note = root + (accidental || '');

  let index = chords.indexOf(note);
  if (index === -1) return chord;

  let newIndex = (index + step + chords.length) % chords.length;
  return chords[newIndex] + rest;
}
</script>
